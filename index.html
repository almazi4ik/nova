<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Nova Engine - Без ошибок!</title>
    <style>
        * {
            user-select: none;
            touch-action: manipulation;
        }
        
        body {
            background: #121212;
            color: #fff;
            font-family: monospace;
            margin: 0;
            padding: 10px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
        }
        
        @media (min-width: 768px) {
            .editor-area {
                display: flex;
                gap: 20px;
                margin-bottom: 20px;
            }
            
            textarea {
                width: 60%;
                height: 400px;
                font-size: 14px;
            }
            
            .controls {
                width: 35%;
            }
            
            canvas {
                width: 600px;
                height: 450px;
            }
            
            button {
                font-size: 16px;
                padding: 12px 24px;
            }
        }
        
        @media (max-width: 767px) {
            textarea {
                width: 100%;
                height: 200px;
                font-size: 16px;
                margin-bottom: 10px;
            }
            
            canvas {
                width: 100%;
                height: auto;
                max-width: 400px;
                aspect-ratio: 4/3;
            }
            
            button {
                font-size: 18px;
                padding: 15px 30px;
                width: 100%;
            }
            
            .mobile-buttons {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 10px;
                margin-top: 15px;
            }
            
            .ctrl-btn {
                background: #333;
                color: white;
                font-size: 24px;
                padding: 15px;
                text-align: center;
                border-radius: 10px;
                cursor: pointer;
                border: 2px solid #ff4500;
            }
            
            .ctrl-btn:active {
                background: #ff4500;
                transform: scale(0.95);
            }
        }
        
        textarea {
            background: #222;
            color: #7cfc00;
            border: 2px solid #ff4500;
            padding: 15px;
            font-family: 'Courier New', monospace;
            resize: vertical;
            border-radius: 10px;
        }
        
        canvas {
            background: #000;
            border: 3px solid #ff4500;
            border-radius: 10px;
            display: block;
            margin: 10px auto;
        }
        
        button {
            background: #ff4500;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s;
            margin: 5px;
        }
        
        button:active {
            transform: scale(0.95);
        }
        
        #output {
            background: #1e1e1e;
            padding: 10px;
            margin-top: 10px;
            border-radius: 10px;
            color: #0f0;
            max-height: 150px;
            overflow-y: auto;
            font-size: 12px;
        }
        
        .info {
            color: #888;
            font-size: 12px;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🚀 Nova Engine 0.4 - Без багов!</h2>
        
        <div class="editor-area">
            <textarea id="editor">
// Игрок
playerX = 200
playerY = 150
create круг playerX playerY 25 "lime"

// Скорость
speed = 5

update {
    if keyLeft { playerX = playerX - speed }
    if keyRight { playerX = playerX + speed }
    if keyUp { playerY = playerY - speed }
    if keyDown { playerY = playerY + speed }
    
    // Границы
    if playerX < 25 { playerX = 25 }
    if playerX > 375 { playerX = 375 }
    if playerY < 25 { playerY = 25 }
    if playerY > 275 { playerY = 275 }
}
            </textarea>
            
            <div class="controls">
                <button onclick="runNova()">🎮 ЗАПУСТИТЬ</button>
                <button onclick="stopNova()" style="background:#666;">⏹️ СТОП</button>
                <button onclick="clearOutput()" style="background:#444;">🗑️ ОЧИСТИТЬ</button>
            </div>
        </div>
        
        <canvas id="gameCanvas" width="400" height="300"></canvas>
        
        <div class="mobile-buttons" id="mobileControls" style="display:none;">
            <div class="ctrl-btn" data-key="ArrowLeft">◀ ЛЕВО</div>
            <div class="ctrl-btn" data-key="ArrowUp">▲ ВВЕРХ</div>
            <div class="ctrl-btn" data-key="ArrowDown">▼ ВНИЗ</div>
            <div class="ctrl-btn" data-key="ArrowRight">▶ ПРАВО</div>
        </div>
        
        <div id="output"></div>
        <div class="info">
            💡 ПК: стрелки клавиатуры | 📱 Телефон: кнопки на экране
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let gameObjects = [];
        let gameInterval = null;
        let isRunning = false;
        
        // Клавиши
        const keys = {
            ArrowLeft: false, ArrowRight: false,
            ArrowUp: false, ArrowDown: false
        };
        
        // Управление с клавиатуры
        document.addEventListener('keydown', (e) => {
            if(keys.hasOwnProperty(e.key)) {
                keys[e.key] = true;
                e.preventDefault();
            }
        });
        
        document.addEventListener('keyup', (e) => {
            if(keys.hasOwnProperty(e.key)) {
                keys[e.key] = false;
                e.preventDefault();
            }
        });
        
        // Мобильные кнопки
        function setupMobileControls() {
            const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
            const mobileDiv = document.getElementById('mobileControls');
            
            if(isMobile) {
                mobileDiv.style.display = 'grid';
                
                document.querySelectorAll('.ctrl-btn').forEach(btn => {
                    const key = btn.getAttribute('data-key');
                    
                    btn.addEventListener('touchstart', (e) => {
                        e.preventDefault();
                        keys[key] = true;
                    });
                    
                    btn.addEventListener('touchend', (e) => {
                        e.preventDefault();
                        keys[key] = false;
                    });
                    
                    btn.addEventListener('mousedown', () => keys[key] = true);
                    btn.addEventListener('mouseup', () => keys[key] = false);
                });
            }
        }
        
        // Функции Nova
        function show(msg) {
            const output = document.getElementById('output');
            const p = document.createElement('div');
            p.textContent = msg;
            output.appendChild(p);
            output.scrollTop = output.scrollHeight;
            
            if(output.children.length > 20) {
                output.removeChild(output.children[0]);
            }
        }
        
        function clearOutput() {
            document.getElementById('output').innerHTML = '';
            show("📝 Вывод очищен");
        }
        
        function draw(type, x, y, size, color) {
            gameObjects.push({ type, x, y, size, color });
        }
        
        function renderAll() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for(let obj of gameObjects) {
                ctx.fillStyle = obj.color;
                
                if(obj.type === "круг") {
                    ctx.beginPath();
                    ctx.arc(obj.x, obj.y, obj.size, 0, Math.PI * 2);
                    ctx.fill();
                } 
                else if(obj.type === "квадрат") {
                    ctx.fillRect(obj.x - obj.size/2, obj.y - obj.size/2, obj.size, obj.size);
                }
            }
        }
        
        // ГЛАВНЫЙ ФИКС - правильный парсинг update блока
        function runNova() {
            stopNova();
            clearOutput();
            
            let code = document.getElementById('editor').value;
            
            // Ищем update блок (любое содержимое между { и })
            let updateMatch = code.match(/update\s*\{([\s\S]*?)\}(?=\s*$|\s*\/\/|\s*[a-z])/m);
            let updateBody = "";
            
            if(updateMatch) {
                updateBody = updateMatch[1];
                // Удаляем update блок из кода
                code = code.replace(/update\s*\{[\s\S]*?\}/, '');
            }
            
            // Транспиляция переменных
            let lines = code.split('\n');
            let jsCode = [];
            
            for(let line of lines) {
                line = line.trim();
                if(line === "") continue;
                
                // Пропускаем комментарии
                if(line.startsWith('//')) {
                    jsCode.push(line);
                    continue;
                }
                
                // show команда
                if(line.startsWith('show ')) {
                    let content = line.substring(5);
                    jsCode.push(`show(${content});`);
                }
                // create команда
                else if(line.startsWith('create ')) {
                    let parts = line.match(/create\s+(круг|квадрат)\s+([^\s]+)\s+([^\s]+)\s+(\d+)\s+"([^"]+)"/);
                    if(parts) {
                        jsCode.push(`draw("${parts[1]}", ${parts[2]}, ${parts[3]}, ${parts[4]}, "${parts[5]}");`);
                    }
                }
                // переменная (x = 10)
                else if(line.match(/^[a-z_][a-z0-9_]*\s*=/i)) {
                    let varMatch = line.match(/^([a-z_][a-z0-9_]*)\s*=/i);
                    if(varMatch) {
                        let varName = varMatch[1];
                        jsCode.push(`window.gameVars.${line}`);
                    }
                }
                // обычный код
                else {
                    jsCode.push(line);
                }
            }
            
            // Инициализируем переменные
            window.gameVars = {};
            try {
                eval(jsCode.join('\n'));
            } catch(e) {
                show("❌ Ошибка: " + e.message);
                console.error(e);
                return;
            }
            
            // Сохраняем update код
            window.updateCode = updateBody;
            
            // Запускаем игровой цикл
            if(window.updateCode && window.updateCode.trim()) {
                isRunning = true;
                gameInterval = setInterval(() => {
                    if(!isRunning) return;
                    
                    gameObjects = [];
                    
                    let vars = window.gameVars || {};
                    vars.keyLeft = keys.ArrowLeft;
                    vars.keyRight = keys.ArrowRight;
                    vars.keyUp = keys.ArrowUp;
                    vars.keyDown = keys.ArrowDown;
                    vars.show = show;
                    
                    try {
                        // Выполняем update код
                        const funcBody = `
                            with(this) {
                                ${window.updateCode}
                            }
                        `;
                        const updateFunc = new Function(funcBody);
                        updateFunc.call(vars);
                        
                        // Сохраняем измененные переменные
                        window.gameVars = {};
                        for(let key in vars) {
                            if(!['keyLeft','keyRight','keyUp','keyDown','show'].includes(key)) {
                                window.gameVars[key] = vars[key];
                            }
                        }
                    } catch(e) {
                        if(!window.errorShown) {
                            show("⚠️ " + e.message);
                            window.errorShown = true;
                            setTimeout(() => { window.errorShown = false; }, 1000);
                        }
                    }
                    
                    renderAll();
                }, 33);
                
                show("✅ Игра запущена! Двигай зеленый круг стрелками");
            } else {
                renderAll();
                show("✅ Код выполнен (нет update блока)");
            }
        }
        
        function stopNova() {
            isRunning = false;
            if(gameInterval) {
                clearInterval(gameInterval);
                gameInterval = null;
            }
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
        
        setupMobileControls();
        
        window.onload = () => {
            show("🎮 Nova Engine готов!");
            show("📝 Пиши код и нажимай ЗАПУСТИТЬ");
        };
    </script>
</body>
</html>
